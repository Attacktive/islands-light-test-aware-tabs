name: 'Release'
on:
  push:
    tags: ['**']

jobs:
  release:
    name: 'Release'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v7'

      - name: 'Check the tag and the Marketplace token'
        env:
          TAG: ${{ github.ref_name }}
          PUBLISH_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
        run: |
          [ -n "$PUBLISH_TOKEN" ] || { echo 'The MARKETPLACE_TOKEN secret is not set' >&2; exit 1; }
          PLUGIN_VERSION=$(sed -n 's/^pluginVersion *= *//p' gradle.properties | tr -d '[:space:]')
          if [ "$TAG" != "$PLUGIN_VERSION" ]; then
            echo "Tag '$TAG' does not match pluginVersion=$PLUGIN_VERSION in gradle.properties" >&2
            exit 1
          fi

      - name: 'Set up JDK'
        uses: 'actions/setup-java@v5'
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 'Set up Gradle'
        uses: 'gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92'

      - name: 'Verify the plugin'
        run: './gradlew verifyPlugin'

      - name: 'Build the plugin'
        run: './gradlew buildPlugin'

      - name: 'Upload the zip to GitHub Releases'
        uses: 'softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b'
        with:
          files: 'build/distributions/islands-light-test-aware-tabs-${{ github.ref_name }}.zip'
          generate_release_notes: true
          prerelease: true

      - name: 'Publish the plugin to JetBrains Marketplace'
        env:
          PUBLISH_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
        run: './gradlew publishPlugin'
