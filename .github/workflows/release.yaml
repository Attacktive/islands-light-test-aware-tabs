name: 'Release'
on:
  push:
    tags: ['**']

env:
  IDEA_VERSION: '2026.1.4'

jobs:
  release:
    name: 'Release'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v7'

      - name: 'Check the tag and the Marketplace token'
        env:
          TAG: ${{ github.ref_name }}
          MARKETPLACE_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
        run: |
          [ -n "$MARKETPLACE_TOKEN" ] || { echo 'The MARKETPLACE_TOKEN secret is not set' >&2; exit 1; }
          PLUGIN_VERSION=$(sed -n 's:.*<version>\(.*\)</version>.*:\1:p' META-INF/plugin.xml)
          if [ "$TAG" != "$PLUGIN_VERSION" ]; then
            echo "Tag '$TAG' does not match <version>$PLUGIN_VERSION</version> in META-INF/plugin.xml" >&2
            exit 1
          fi

      - name: 'Set up JDK'
        uses: 'actions/setup-java@v5'
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 'Cache IntelliJ IDEA'
        id: 'cache-idea'
        uses: 'actions/cache@v6'
        with:
          path: 'idea'
          key: 'idea-${{ env.IDEA_VERSION }}'

      - name: 'Download IntelliJ IDEA'
        if: steps.cache-idea.outputs.cache-hit != 'true'
        run: |
          mkdir idea
          curl -fsSL "https://download.jetbrains.com/idea/idea-${IDEA_VERSION}.tar.gz" | tar -xz --strip-components=1 -C idea

      # the install-copy loop inside build.sh skips silently because the runner has no ~/.local/share/JetBrains dirs
      - name: 'Build the plugin jar'
        run: IDE="$PWD/idea" ./build.sh

      - name: 'Rename the artifact'
        run: mv islands-light-test-aware-tabs.jar "islands-light-test-aware-tabs-${{ github.ref_name }}.jar"

      - name: 'Upload the jar to GitHub Releases'
        uses: 'softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b' # v3.0.1
        with:
          files: 'islands-light-test-aware-tabs-${{ github.ref_name }}.jar'
          generate_release_notes: true

      - name: 'Upload the jar to JetBrains Marketplace'
        env:
          MARKETPLACE_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
        run: 'curl -sS --fail-with-body --header "Authorization: Bearer $MARKETPLACE_TOKEN" -F xmlId=xyz.attacktive.islands-light-test-aware-tabs -F "file=@islands-light-test-aware-tabs-${{ github.ref_name }}.jar" https://plugins.jetbrains.com/api/updates/upload'
